<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage PDF Reader</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- The Translator: PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- The Physics Engine: StPageFlip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <!-- 🌟 The Premium Dashboard Overlay -->
    <div id="dashboard" class="dashboard">
        <!-- The Parchment Drag & Drop Zone -->
        <div id="drop-zone" class="parchment-drop-zone">
            <h1>The Grand Archives</h1>
            <p>Drag and drop a tome (.pdf) onto this parchment</p>
            <p class="or-text">— or —</p>
            
            <!-- Elegant Button Hook (Hides the ugly native button!) -->
            <label for="file-upload" class="elegant-btn">Browse Archives</label>
            <input id="file-upload" type="file" accept="application/pdf" style="display: none;" />
        </div>
    </div>

    <!-- The desk (We hide the empty desk until a book is uploaded!) -->
    <div id="desk" class="desk hidden">
        <div id="book" class="book"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
